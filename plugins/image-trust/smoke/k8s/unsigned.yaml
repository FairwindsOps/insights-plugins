apiVersion: apps/v1
kind: Deployment
metadata:
  name: unsigned
  namespace: image-trust-smoke
  labels:
    app: unsigned
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unsigned
  template:
    metadata:
      labels:
        app: unsigned
    spec:
      containers:
        - name: app
          image: docker.io/library/busybox:1.36
          command: ["sleep", "infinity"]

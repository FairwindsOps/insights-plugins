# RBAC for image-trust (pull secrets + supplemental discovery).
# Apply in the Fairwinds Insights Agent namespace and bind to the image-trust ServiceAccount.
# secrets/namespaces: IMAGE_TRUST_USE_IMAGE_PULL_SECRETS
# pods/jobs: orphan running pods and active Jobs not covered by top-level controller discovery
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: insights-agent-image-trust-secrets-reader
  labels:
    app.kubernetes.io/name: image-trust
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: insights-agent-image-trust-secrets-reader
  labels:
    app.kubernetes.io/name: image-trust
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: insights-agent-image-trust-secrets-reader
subjects:
  - kind: ServiceAccount
    name: insights-agent-image-trust
    namespace: insights-agent

syntax = "proto3";

package flow.v1;

option go_package = "github.com/fairwindsops/insights-plugins/plugins/network-flow/pkg/flow/v1;flowv1";

enum FlowEventKind {
  FLOW_EVENT_KIND_UNSPECIFIED = 0;
  FLOW_EVENT_KIND_CONNECT = 1;
  FLOW_EVENT_KIND_TRAFFIC = 2;
}

enum Protocol {
  PROTOCOL_UNSPECIFIED = 0;
  PROTOCOL_TCP = 1;
}

message Endpoint {
  string addr = 1;
  uint32 port = 2;
}

message WorkloadRef {
  string namespace = 1;
  string pod = 2;
  string container = 3;
}

message KubernetesRef {
  string namespace = 1;
  string kind = 2;
  string name = 3;
}

message FlowEvent {
  FlowEventKind event_kind = 1;
  Protocol protocol = 2;
  int64 timestamp_unix_nano = 3;
  WorkloadRef src = 4;
  Endpoint src_endpoint = 5;
  Endpoint dst = 6;
  uint64 bytes_sent = 7;
  uint64 bytes_received = 8;
}

message FlowEventBatch {
  string node_name = 1;
  string agent_id = 2;
  repeated FlowEvent events = 3;
}

message EnrichedFlowEvent {
  string node_name = 1;
  string agent_id = 2;
  FlowEventKind event_kind = 3;
  Protocol protocol = 4;
  int64 timestamp_unix_nano = 5;
  WorkloadRef src = 6;
  KubernetesRef src_workload = 7;
  Endpoint src_endpoint = 8;
  Endpoint dst = 9;
  KubernetesRef dst_ref = 10;
  uint64 bytes_sent = 11;
  uint64 bytes_received = 12;
}

message PushAck {
  int64 accepted_events = 1;
}

service FlowIngest {
  rpc PushEvents(stream FlowEventBatch) returns (PushAck);
}

syntax = "proto3";

package flow.v1;

option go_package = "github.com/fairwindsops/insights-plugins/plugins/network-flow/pkg/flow/v1;flowv1";

enum FlowType {
  FLOW_TYPE_UNSPECIFIED = 0;
  FLOW_TYPE_TCP = 1;
  FLOW_TYPE_DNS = 2;
  FLOW_TYPE_HTTP = 3;
}

message WorkloadEndpoint {
  string namespace = 1;
  string pod = 2;
  string container = 3;
}

message NetworkEndpoint {
  string addr = 1;
  uint32 port = 2;
}

message NetworkFlow {
  FlowType type = 1;
  int64 timestamp_unix_nano = 2;
  WorkloadEndpoint src = 3;
  NetworkEndpoint dst = 4;
  map<string, string> metadata = 5;
  uint64 bytes_sent = 6;
  uint64 bytes_received = 7;
}

message FlowBatch {
  string node_name = 1;
  string agent_id = 2;
  repeated NetworkFlow flows = 3;
}

message PushAck {
  int64 accepted_flows = 1;
}

service FlowIngest {
  rpc PushFlows(stream FlowBatch) returns (PushAck);
}

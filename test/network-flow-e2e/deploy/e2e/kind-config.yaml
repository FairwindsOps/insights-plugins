# kind cluster tuned for eBPF workloads (bpf/debugfs mounts on the node).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: network-flow
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: /sys/fs/bpf
        containerPath: /sys/fs/bpf
      - hostPath: /sys/kernel/debug
        containerPath: /sys/kernel/debug

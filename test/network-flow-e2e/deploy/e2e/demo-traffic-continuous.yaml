apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-traffic
  namespace: insights
  labels:
    app: demo-traffic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-traffic
  template:
    metadata:
      labels:
        app: demo-traffic
    spec:
      containers:
        - name: traffic
          image: curlimages/curl:8.11.1
          command:
            - sh
            - -c
            - |
              set -eu
              echo "generating continuous TCP flows in insights namespace..."
              payload="$(head -c 65536 /dev/zero | tr '\0' 'A')"
              while true; do
                curl -sf "http://demo-server:8080/" -o /dev/null || true
                curl -sf -X POST -d "$payload" "http://demo-server:8080/" -o /dev/null || true
                curl -sf "http://demo-server.shop.svc.cluster.local:8080/" -o /dev/null || true
                curl -sf -X POST -d "$payload" "http://demo-server.shop.svc.cluster.local:8080/" -o /dev/null || true
                curl -sf "http://example.com/" -o /dev/null || true
                sleep 0.25
              done
---

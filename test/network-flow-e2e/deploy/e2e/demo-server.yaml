apiVersion: v1
kind: Service
metadata:
  name: demo-server
  labels:
    app: demo-server
spec:
  selector:
    app: demo-server
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-server
  labels:
    app: demo-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-server
  template:
    metadata:
      labels:
        app: demo-server
    spec:
      containers:
        - name: server
          image: hashicorp/http-echo:1.0.0
          args: ["-listen=:8080", "-text=ok"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 3

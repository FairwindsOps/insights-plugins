apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: insights

resources:
  - ../stack
  - demo-server.yaml
  - demo-traffic-job.yaml

images:
  - name: quay.io/fairwinds/network-flow
    newName: network-flow
    newTag: local
  - name: quay.io/fairwinds/network-flow-aggregator
    newName: network-flow-aggregator
    newTag: local

patches:
  - path: patches/local-images.yaml
    target:
      kind: DaemonSet
      name: network-flow
  - path: patches/local-images.yaml
    target:
      kind: Deployment
      name: network-flow-aggregator

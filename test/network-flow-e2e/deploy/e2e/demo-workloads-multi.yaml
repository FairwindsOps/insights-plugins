apiVersion: v1
kind: Service
metadata:
  name: demo-server
  namespace: shop
  labels:
    app: demo-server
spec:
  selector:
    app: demo-server
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-server
  namespace: shop
  labels:
    app: demo-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-server
  template:
    metadata:
      labels:
        app: demo-server
    spec:
      containers:
        - name: server
          image: hashicorp/http-echo:1.0.0
          args: ["-listen=:8080", "-text=ok"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 3
---
apiVersion: batch/v1
kind: Job
metadata:
  name: demo-traffic
  namespace: shop
  labels:
    app: demo-traffic
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: demo-traffic
    spec:
      restartPolicy: Never
      containers:
        - name: traffic
          image: curlimages/curl:8.11.1
          command:
            - sh
            - -c
            - |
              set -eu
              echo "generating TCP flows in shop namespace..."
              payload="$(head -c 65536 /dev/zero | tr '\0' 'A')"
              for i in $(seq 1 80); do
                curl -sf "http://demo-server:8080/" -o /dev/null
                curl -sf -X POST -d "$payload" "http://demo-server:8080/" -o /dev/null
                curl -sf "http://demo-server.payments.svc.cluster.local:8080/" -o /dev/null
                curl -sf -X POST -d "$payload" "http://demo-server.payments.svc.cluster.local:8080/" -o /dev/null
                sleep 0.25
              done
              echo "done"
---

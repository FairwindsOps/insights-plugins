apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: insights

resources:
  - ../../stack

images:
  - name: quay.io/fairwinds/network-flow
    newName: network-flow
    newTag: local

patches:
  - path: patches/local-images.yaml
    target:
      kind: DaemonSet
      name: network-flow
  - path: patches/block-collector.yaml
    target:
      kind: DaemonSet
      name: network-flow
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: network-flow-aggregator
        namespace: insights
  - patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: network-flow-aggregator
        namespace: insights
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: network-flow-aggregator
        namespace: insights
  - patch: |-
      $patch: delete
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: network-flow-aggregator
  - patch: |-
      $patch: delete
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: network-flow-aggregator

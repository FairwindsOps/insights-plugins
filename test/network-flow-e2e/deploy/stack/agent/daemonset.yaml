apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: network-flow
  namespace: insights
  labels:
    app.kubernetes.io/name: network-flow
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: network-flow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: network-flow
      annotations:
        container.apparmor.security.beta.kubernetes.io/agent: unconfined
    spec:
      serviceAccountName: network-flow
      hostPID: false
      hostNetwork: false
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: quay.io/fairwinds/fw-network-flow:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: COLLECTOR_ADDR
              value: network-flow-aggregator.insights.svc:4317
            - name: IG_ADDR
              value: tcp://127.0.0.1:8080
            - name: TRACE_TCP_IMAGE
              value: ghcr.io/inspektor-gadget/gadget/trace_tcp:v0.52.0
            - name: TOP_TCP_IMAGE
              value: ghcr.io/inspektor-gadget/gadget/top_tcp:v0.52.0
            - name: GADGET_POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: GADGET_IMAGE
              value: ghcr.io/inspektor-gadget/inspektor-gadget
            - name: HOST_ROOT
              value: /host
          securityContext:
            readOnlyRootFilesystem: true
            seLinuxOptions:
              type: spc_t
            capabilities:
              drop: [ALL]
              add:
                - SYS_ADMIN
                - SYSLOG
                - SYS_PTRACE
                - SYS_RESOURCE
                - IPC_LOCK
                - NET_RAW
                - NET_ADMIN
          volumeMounts:
            - mountPath: /host/bin
              name: bin
              readOnly: true
            - mountPath: /host/etc
              name: etc
            - mountPath: /host/opt
              name: opt
            - mountPath: /host/usr
              name: usr
              readOnly: true
            - mountPath: /host/run
              name: run
              readOnly: true
            - mountPath: /host/var
              name: var
              readOnly: true
            - mountPath: /host/proc
              name: proc
              readOnly: true
            - mountPath: /run
              name: run
            - mountPath: /sys/kernel/debug
              name: debugfs
            - mountPath: /sys/fs/cgroup
              name: cgroup
              readOnly: true
            - mountPath: /sys/fs/bpf
              name: bpffs
            - mountPath: /var/lib/ig
              name: oci
            - mountPath: /etc/ig
              name: config
              readOnly: true
            - mountPath: /var/run/ig/wasm-cache
              name: wasm-cache
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: bin
          hostPath:
            path: /bin
        - name: etc
          hostPath:
            path: /etc
        - name: opt
          hostPath:
            path: /opt
        - name: usr
          hostPath:
            path: /usr
        - name: proc
          hostPath:
            path: /proc
        - name: run
          hostPath:
            path: /run
        - name: var
          hostPath:
            path: /var
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
        - name: oci
          emptyDir: {}
        - name: wasm-cache
          emptyDir: {}
        - name: config
          configMap:
            name: network-flow
            defaultMode: 0400

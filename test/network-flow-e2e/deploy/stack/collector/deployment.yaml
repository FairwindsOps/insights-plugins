apiVersion: v1
kind: Service
metadata:
  name: network-flow-aggregator
  namespace: insights
  labels:
    app.kubernetes.io/name: network-flow-aggregator
spec:
  selector:
    app.kubernetes.io/name: network-flow-aggregator
  ports:
    - name: grpc
      port: 4317
      targetPort: grpc
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-flow-aggregator
  namespace: insights
  labels:
    app.kubernetes.io/name: network-flow-aggregator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: network-flow-aggregator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: network-flow-aggregator
    spec:
      serviceAccountName: network-flow-aggregator
      containers:
        - name: network-flow-aggregator
          image: quay.io/fairwinds/network-flow-aggregator:0.0.3
          imagePullPolicy: IfNotPresent
          command: ["network-flow-aggregator"]
          args:
            - -grpc-addr=:4317
            - -http-addr=:8080
          ports:
            - name: grpc
              containerPort: 4317
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
